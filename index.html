<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg: #0d0d0f;
  --bg2: #141417;
  --bg3: #1c1c21;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f2;
  --text2: #888890;
  --text3: #555560;

  --cat-lumiia:   #ff6b35;
  --cat-signal:   #00e5ff;
  --cat-raffines: #c084fc;
  --cat-perso:    #4ade80;
  --cat-admin:    #fbbf24;
  --cat-urgent:   #f43f5e;

  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(13,13,15,0.92);
  backdrop-filter: blur(12px);
  z-index: 100;
}

.header-left { display: flex; align-items: center; gap: 10px; }

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  color: var(--text);
}
.logo span { color: var(--cat-lumiia); }

.user-badge {
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text2);
}

.header-actions { display: flex; gap: 8px; }

.btn-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-icon:hover { background: var(--bg3); color: var(--text); border-color: rgba(255,255,255,0.15); }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 4px;
  padding: 12px 20px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active {
  background: var(--accent, var(--cat-lumiia));
  border-color: transparent;
  color: #000;
}
.tab:hover:not(.active) { color: var(--text2); border-color: rgba(255,255,255,0.15); }

/* ── MAIN ── */
main {
  padding: 16px 20px 100px;
}

/* ── SECTION TITLE ── */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  margin-top: 8px;
}
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
}

/* ── CARDS GRID ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.card {
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border: 1px solid rgba(255,255,255,0.05);
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
.card:active { transform: scale(0.97); }

.card-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
  flex: 1;
}

.card-meta {
  font-size: 0.8rem;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 5px;
  line-height: 1.5;
}

.card-checklist-preview {
  font-size: 0.8rem;
  color: var(--text2);
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.cl-item-preview {
  display: flex; align-items: center; gap: 5px;
  text-decoration: none;
}
.cl-item-preview.done { color: var(--text3); text-decoration: line-through; }
.cl-checkbox-mini {
  width: 11px; height: 11px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* Category color accents */
.card[data-cat="lumiia"]   { background: linear-gradient(135deg, rgba(255,107,53,0.12) 0%, rgba(20,20,23,0.9) 60%); }
.card[data-cat="signal"]   { background: linear-gradient(135deg, rgba(0,229,255,0.1) 0%, rgba(20,20,23,0.9) 60%); }
.card[data-cat="raffines"] { background: linear-gradient(135deg, rgba(192,132,252,0.12) 0%, rgba(20,20,23,0.9) 60%); }
.card[data-cat="perso"]    { background: linear-gradient(135deg, rgba(74,222,128,0.1) 0%, rgba(20,20,23,0.9) 60%); }
.card[data-cat="admin"]    { background: linear-gradient(135deg, rgba(251,191,36,0.1) 0%, rgba(20,20,23,0.9) 60%); }
.card[data-cat="urgent"]   { background: linear-gradient(135deg, rgba(244,63,94,0.12) 0%, rgba(20,20,23,0.9) 60%); }

.dot-lumiia   { background: var(--cat-lumiia); }
.dot-signal   { background: var(--cat-signal); }
.dot-raffines { background: var(--cat-raffines); }
.dot-perso    { background: var(--cat-perso); }
.dot-admin    { background: var(--cat-admin); }
.dot-urgent   { background: var(--cat-urgent); }

/* ── TODO LIST ── */
.todo-section { margin-bottom: 24px; }

.todo-cat-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.todo-cat-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.todo-cat-label {
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.todo-cat-count {
  font-size: 0.7rem;
  color: var(--text3);
  margin-left: auto;
}

.todo-list { display: flex; flex-direction: column; gap: 6px; }

.todo-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  transition: all 0.15s;
  cursor: pointer;
}
.todo-item:hover { border-color: rgba(255,255,255,0.12); }
.todo-item.done { opacity: 0.4; }
.todo-item.done .todo-text { text-decoration: line-through; color: var(--text3); }

.todo-check {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 2px solid var(--text3);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-size: 0.75rem;
}
.todo-item.done .todo-check {
  background: var(--text3);
  border-color: transparent;
  color: var(--bg);
}

.todo-text {
  flex: 1;
  font-size: 0.85rem;
  line-height: 1.35;
}

.todo-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.priority-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
}
.prio-urgent { background: var(--cat-urgent); }
.prio-normal { background: var(--text3); }
.prio-later  { background: var(--bg3); border: 1px solid var(--text3); }

.assignee-tag {
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--bg3);
  color: var(--text2);
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.05em;
}

.due-tag {
  font-size: 0.68rem;
  color: var(--text3);
}
.due-tag.overdue { color: var(--cat-urgent); }

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 56px; height: 56px;
  border-radius: 18px;
  background: var(--cat-lumiia);
  border: none;
  color: #000;
  font-size: 1.5rem;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  z-index: 200;
}
.fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(255,107,53,0.55); }
.fab:active { transform: scale(0.94); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 300;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 24px;
  width: calc(100% - 32px);
  max-width: 560px;
  padding: 20px 20px 32px;
  transform: translateY(-20px);
  transition: transform 0.25s cubic-bezier(.22,.68,0,1.2);
  max-height: 90dvh;
  overflow-y: auto;
}
.modal-overlay.open .modal {
  transform: translateY(0);
}

.modal-handle {
  width: 40px; height: 4px;
  border-radius: 2px;
  background: var(--text3);
  margin: 0 auto 20px;
}

.modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 18px;
}

.field-label {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 7px;
  font-family: 'Syne', sans-serif;
}

.field-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 14px;
}
.field-input:focus { border-color: rgba(255,255,255,0.25); }
textarea.field-input { resize: none; min-height: 80px; }

.cat-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.cat-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 0.78rem;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.cat-btn.selected {
  border-color: transparent;
  color: #000;
}
.cat-btn .dot { width: 8px; height: 8px; border-radius: 50%; }

.type-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.type-btn {
  flex: 1;
  padding: 9px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 0.8rem;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.type-btn.active { background: var(--bg3); border-color: rgba(255,255,255,0.2); color: var(--text); }

/* checklist editor */
.cl-editor { margin-bottom: 14px; }
.cl-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.cl-row input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 11px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  outline: none;
}
.cl-row input:focus { border-color: rgba(255,255,255,0.2); }
.cl-del {
  background: none; border: none;
  color: var(--text3); font-size: 1rem;
  cursor: pointer; padding: 4px;
  transition: color 0.15s;
}
.cl-del:hover { color: var(--cat-urgent); }
.add-cl-item {
  display: flex; align-items: center; gap: 6px;
  background: none; border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 8px 11px;
  color: var(--text3);
  font-size: 0.8rem;
  cursor: pointer;
  width: 100%;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.add-cl-item:hover { border-color: rgba(255,255,255,0.2); color: var(--text2); }

/* prio & assignee row */
.row-fields { display: flex; gap: 10px; margin-bottom: 14px; }
.row-fields > div { flex: 1; }
select.field-input { margin-bottom: 0; cursor: pointer; }

.modal-actions { display: flex; gap: 10px; margin-top: 6px; }
.btn-primary {
  flex: 1;
  padding: 13px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--cat-lumiia);
  color: #000;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  padding: 13px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-secondary:hover { background: var(--bg3); }

/* ── NOTE DETAIL MODAL ── */
.note-detail { padding: 0; }
.note-detail-header {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 16px;
}
.note-detail-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  flex: 1;
  line-height: 1.3;
}
.note-detail-content {
  font-size: 0.9rem;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 16px;
  white-space: pre-wrap;
}
.checklist-full { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.cl-item-full {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
}
.cl-check-full {
  width: 22px; height: 22px;
  border-radius: 7px;
  border: 2px solid var(--text3);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem;
  transition: all 0.15s;
}
.cl-item-full.done .cl-check-full { background: var(--text2); border-color: transparent; color: var(--bg); }
.cl-item-full.done .cl-item-text { text-decoration: line-through; color: var(--text3); }
.cl-item-text { font-size: 0.88rem; }

.note-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.btn-delete {
  background: none; border: none;
  color: var(--text3);
  font-size: 0.8rem;
  cursor: pointer;
  padding: 6px;
  transition: color 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.btn-delete:hover { color: var(--cat-urgent); }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
.empty-text { font-size: 0.85rem; line-height: 1.6; }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  font-size: 0.72rem;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.filter-chip.active { color: var(--text); border-color: rgba(255,255,255,0.2); background: var(--bg3); }

/* ── VIEW SWITCHER ── */
.view-toggle {
  display: flex; gap: 4px;
}
.view-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-size: 0.85rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.view-btn.active { background: var(--bg3); color: var(--text); border-color: rgba(255,255,255,0.15); }

/* ── TODO LIST VIEW ── */
.todo-list-view { display: flex; flex-direction: column; gap: 6px; }

.todo-item.needs-validation {
  border-color: rgba(255,107,53,0.5);
  background: rgba(255,107,53,0.08);
}
/* ── URGENCE — trait gauche ── */
.card.urgent-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--cat-urgent);
  border-radius: var(--radius) 0 0 var(--radius);
}
.todo-item.urgent-item {
  border-left: 3px solid var(--cat-urgent);
  padding-left: 11px;
}
.todo-item.waiting-assigned {
  border-left: 3px solid rgba(251,191,36,0.7);
  background: rgba(251,191,36,0.06);
  padding-left: 11px;
  opacity: 0.9;
}
.todo-item.waiting-assigned.urgent-item {
  border-left: 3px solid var(--cat-urgent);
  background: rgba(251,191,36,0.06);
}
.projet-card {
  cursor: pointer;
}
.projet-card:hover {
  transform: translateY(-3px) !important;
  box-shadow: 0 10px 35px rgba(0,0,0,0.5) !important;
}

.overdue-banner {
  display: flex; align-items: center; gap: 8px;
  background: rgba(244,63,94,0.1);
  border: 1px solid rgba(244,63,94,0.25);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  margin-bottom: 14px;

}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* ── ANIMATIONS ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card, .todo-item { animation: fadeIn 0.2s ease both; }

/* ── DESKTOP ── */
@media (min-width: 640px) {
  header { padding: 18px 32px 14px; }
  main { padding: 20px 32px 100px; }

</style>
</head>
<body>

<!-- CREATE / EDIT MODAL -->
<div class="modal-overlay" id="modal-create">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">

    </div>

    <div class="type-toggle" id="type-toggle">

      <button class="type-btn" data-type="todo" onclick="setType('todo')">➡️ Envoyer vers To-do</button>

    <div class="field-label">Titre</div>

      <!-- Toggle checklist -->

        <button id="toggle-cl-btn" onclick="toggleChecklist()" style="display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text2);font-size:0.78rem;font-family:Syne,sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s">
          ☑️ Ajouter une checklist

      </div>

    <!-- Todo fields -->
    <div id="field-todo" style="display:none">
      <div class="row-fields">
        <div>

          ☑️ Ajouter une checklist
        </button>
      </div>
      <div id="field-checklist-todo" style="display:none">
        <div class="field-label">Checklist</div>
        <div class="cl-editor" id="cl-editor-todo"></div>

      <select class="field-input" id="input-validate-by">
        <option value="">Aucune validation requise</option>

    <div id="field-note-prio">

      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="prio-btn" data-prio="urgent" onclick="selectNotePrio('urgent')" style="flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:0.8rem;cursor:pointer;transition:all 0.15s">🔴 Urgent</button>
        <button class="prio-btn" data-prio="normal" onclick="selectNotePrio('normal')" style="flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:0.8rem;cursor:pointer;transition:all 0.15s">🟡 Normal</button>
        <button class="prio-btn active" data-prio="later" onclick="selectNotePrio('later')" style="flex:1;padding:7px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:var(--bg3);color:var(--text);font-size:0.8rem;cursor:pointer;transition:all 0.15s">⚪ Plus tard</button>

  <div class="modal">

      <div class="modal-title" style="margin-bottom:0">⚙️ Réglages</div>
      <button onclick="closeModal('modal-settings')" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;color:var(--text2);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
    </div>

    <div id="cat-list-editor-projects" style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px"></div>

    <div style="height:24px"></div>

    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input type="text" id="new-member-name" placeholder="Prénom..." style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:DM Sans,sans-serif;font-size:0.88rem;outline:none">
      <button onclick="addMember()" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text2);font-family:Syne,sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer">+ Ajouter</button>
    </div>

    <div class="modal-actions">

      <button class="btn-primary" onclick="saveCats()">Enregistrer</button>

  </div>

<script type="module">
// ─────────────────────────────────────────────
// FIREBASE
// ─────────────────────────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyBPgjVFKrP80qX_hlfUFqL168XONfNIBA4",
  authDomain: "lumiia-live.firebaseapp.com",
  databaseURL: "https://lumiia-live-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lumiia-live",
  storageBucket: "lumiia-live.firebasestorage.app",
  messagingSenderId: "823919513931",
  appId: "1:823919513931:web:6f6f3c7c6d1699457b18ce"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const NOTES_REF = ref(db, 'workspace/items');

// Sync temps réel Firebase → local
onValue(NOTES_REF, (snapshot) => {
  const data = snapshot.val();
  items = data ? Object.values(data) : [];
  // Seed demo si vide
  if (items.length === 0) seedDemo();
  else render();
});

async function save() {
  // Convertit le tableau en objet keyed par id pour Firebase
  const obj = {};
  items.forEach(item => { obj[item.id] = item; });
  await set(NOTES_REF, obj);
}

async function removeItem(id) {
  await remove(ref(db, `workspace/items/${id}`));
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const CATS = {
  lumiia:   { label: 'LUMIIA',   color: '#ff6b35', isProject: true },
  signal:   { label: 'SIGNAL',   color: '#00e5ff', isProject: true },
  raffines: { label: 'Raffinés', color: '#c084fc', isProject: true },
  perso:    { label: 'Perso',    color: '#4ade80', isProject: false },
  admin:    { label: 'Admin',    color: '#fbbf24', isProject: false },
  courant:  { label: 'Courant',  color: '#6b7280', isProject: false },
};

const USERS = {
  em: 'Emmanuel',
  au: 'Aurélie',
  ma: 'Marion',
};

let currentUser = 'em';
let currentTab = 'notes';
let currentType = 'note';
let currentCat = 'lumiia';
let currentNotePrio = 'normal';
let filterCat = 'all';
let sortOrder = 'recent';
let editingId = null;
let clItems = [];
let clItemsTodo = [];
let items = [];

// Membres configurables (stockés en localStorage)
let MEMBERS = JSON.parse(localStorage.getItem('lumiia-members') || 'null') || [
  { id: 'em', name: 'Emmanuel', url: 'em' },
  { id: 'au', name: 'Aurélie', url: 'au' },
  { id: 'ma', name: 'Marion', url: 'ma' },
];

// Restaurer l'utilisateur depuis localStorage (juste la préférence de session)
const savedUser = localStorage.getItem('lumiia-workspace-user');
// Vérifier aussi le paramètre URL ?user= (lien d'invitation)
const urlUser = new URLSearchParams(window.location.search).get('user');
if (urlUser && ['em','au','ma'].includes(urlUser)) {
  currentUser = urlUser;
  localStorage.setItem('lumiia-workspace-user', urlUser);
} else if (savedUser) {
  currentUser = savedUser;
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ─────────────────────────────────────────────
// USER
// ─────────────────────────────────────────────
function setUser(u) {
  currentUser = u;
  localStorage.setItem('lumiia-workspace-user', u);
  document.getElementById('user-badge').textContent = u.toUpperCase();
  closeModal('modal-user');
  render();
}

function showUserPicker() {
  const colors = ['var(--cat-lumiia)','var(--cat-signal)','var(--cat-raffines)','var(--cat-perso)','var(--cat-admin)'];
  const list = document.getElementById('user-picker-list');
  if (list) {
    list.innerHTML = MEMBERS.map((m, i) => {
      const isActive = m.id === currentUser;
      return `<button onclick="setUser('${m.id}')"
        style="display:flex;align-items:center;gap:12px;background:${isActive ? 'rgba(255,107,53,0.1)' : 'var(--bg3)'};border:1px solid ${isActive ? 'var(--cat-lumiia)' : 'var(--border)'};border-radius:12px;padding:12px 16px;cursor:pointer;width:100%;text-align:left;transition:all 0.15s">
        <div style="width:36px;height:36px;border-radius:50%;background:${colors[i%colors.length]};display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-weight:800;font-size:0.8rem;color:#000;flex-shrink:0">${m.name.slice(0,2).toUpperCase()}</div>
        <div style="flex:1">
          <div style="font-family:Syne,sans-serif;font-weight:700;font-size:0.95rem;color:var(--text)">${m.name}</div>
          <div style="font-size:0.72rem;color:var(--text3)">Espace ${m.name}</div>
        </div>
        ${isActive ? '<div style="font-size:0.7rem;color:var(--cat-lumiia);font-family:Syne,sans-serif;font-weight:700">✓ ACTIF</div>' : ''}
      </button>`;
    }).join('');
  }
  openModal('modal-user');
}

// ─────────────────────────────────────────────
// TAB
// ─────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  currentProject = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  filterCat = 'all';
  render();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
let currentProject = null; // id de la catégorie projet sélectionnée

function render() {
  const el = document.getElementById('main-content');
  if (currentTab === 'notes') el.innerHTML = renderNotes();
  else if (currentTab === 'todo') el.innerHTML = renderTodos();
  else if (currentTab === 'projets') el.innerHTML = renderProjets();
  // Masquer/afficher le FAB
  const fab = document.getElementById('fab');
  if (fab) fab.style.display = currentTab === 'projets' && !currentProject ? 'none' : '';
}

function renderNotes() {
  const myNotes = items.filter(i => 
    (i.type === 'note' || i.type === 'checklist') &&
    (i.owner === currentUser || i.shared)
  );
  const filtered = applySortOrder(applyFilterCat(myNotes));

  let html = `<div class="section-head">
    <div class="section-title">${filtered.length} note${filtered.length !== 1 ? 's' : ''}</div>
  </div>`;

  // Filter bar
  html += renderFilterBar(myNotes);

  if (filtered.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon">📝</div>
      <div class="empty-text">Aucune note pour l'instant.<br>Appuie sur + pour commencer.</div>
    </div>`;
    return html;
  }

  html += `<div class="cards-grid">`;
  filtered.forEach((item, idx) => {
    html += renderCard(item, idx);
  });
  html += `</div>`;
  return html;
}

function renderCard(item, idx) {
  const cat = CATS[item.cat] || CATS.lumiia;
  let preview = '';
  const titleLen = item.title?.length || 0;
  const shortTitle = titleLen < 25; // titre court = on peut montrer plus de contenu

  if (item.checklist?.length > 0) {
    const shown = item.checklist.slice(0, shortTitle ? 2 : 2);
    preview = `<div class="card-checklist-preview">` +
      shown.map(ci => `
        <div class="cl-item-preview${ci.done ? ' done' : ''}">
          <div class="cl-checkbox-mini" style="background:${ci.done ? cat.color : 'transparent'};border:1.5px solid ${ci.done ? cat.color : '#555'}"></div>
          ${ci.text}
        </div>`).join('') +
      (item.checklist.length > 2 ? `<div style="color:var(--text3);font-size:0.72rem">+${item.checklist.length - 2} autres</div>` : '') +
    `</div>`;
    // Si aussi du contenu texte et titre court, l'afficher en mini
    if (item.content && shortTitle) {
      preview = `<div class="card-meta" style="font-size:0.82rem;margin-bottom:4px">${item.content.slice(0, 50)}${item.content.length > 50 ? '…' : ''}</div>` + preview;
    }
  } else if (item.content) {
    const maxChars = shortTitle ? 90 : 55;
    const lines = item.content.split('\n').slice(0, 2).join(' ');
    preview = `<div class="card-meta" style="font-size:0.82rem;line-height:1.55">${lines.slice(0, maxChars)}${lines.length > maxChars ? '…' : ''}</div>`;
  }

  const dateStr = item.created ? new Date(item.created).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }) : '';
  const linkBadge = item.link ? `<div style="font-size:0.72rem;color:var(--cat-signal)">🔗</div>` : '';

  const urgentClass = item.prio === 'urgent' ? ' urgent-card' : '';

  return `<div class="card${urgentClass}" data-cat="${item.cat}" onclick="openDetail('${item.id}')" style="animation-delay:${idx * 0.03}s">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="card-dot dot-${item.cat}"></div>
      <div style="display:flex;align-items:center;gap:6px">${linkBadge}<div class="card-meta" style="font-size:0.72rem">${cat.label}</div></div>
    </div>
    <div class="card-title">${item.title}</div>
    ${preview}
    <div class="card-meta" style="margin-top:auto;font-size:0.75rem;color:var(--text3)">${dateStr}</div>
  </div>`;
}

function renderTodos() {
  // Premier membre = admin (voit tout), les autres voient leurs tâches assignées
  const isAdmin = currentUser === MEMBERS[0]?.id;
  let todos;
  if (isAdmin) {
    todos = items.filter(i => i.type === 'todo');
  } else {
    todos = items.filter(i => i.type === 'todo' && i.assignee === currentUser);
  }

  const filtered = applySortOrder(applyFilterCat(todos));
  const active = filtered.filter(i => !i.done);
  const done = filtered.filter(i => i.done);
  const overdue = active.filter(i => i.due && new Date(i.due) < new Date());

  let html = `<div class="section-head">
    <div class="section-title">${active.length} tâche${active.length !== 1 ? 's' : ''} active${active.length !== 1 ? 's' : ''}</div>
  </div>`;

  html += renderFilterBar(todos);

  if (overdue.length > 0) {
    html += `<div class="overdue-banner">⚠️ ${overdue.length} tâche${overdue.length > 1 ? 's' : ''} en retard</div>`;
  }

  if (active.length === 0 && done.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon">✅</div>
      <div class="empty-text">Aucune tâche.<br>Appuie sur + pour en créer une.</div>
    </div>`;
    return html;
  }

  // Group by category
  const cats = [...new Set(active.map(i => i.cat))];
  cats.forEach(cat => {
    const catItems = active.filter(i => i.cat === cat);
    const c = CATS[cat] || CATS.lumiia;
    html += `<div class="todo-section">
      <div class="todo-cat-header">
        <div class="todo-cat-dot" style="background:${c.color}"></div>
        <div class="todo-cat-label" style="color:${c.color}">${c.label}</div>
        <div class="todo-cat-count">${catItems.length}</div>
      </div>
      <div class="todo-list">`;
    catItems.forEach((item, idx) => {
      html += renderTodoItem(item, idx);
    });
    html += `</div></div>`;
  });

  if (done.length > 0) {
    // Trier : validées d'abord, puis par date de mise à jour
    const sortedDone = [...done].sort((a, b) => {
      if (a.validated && !b.validated) return -1;
      if (!a.validated && b.validated) return 1;
      return (b.updated || b.created || 0) - (a.updated || a.created || 0);
    });

    html += `<div class="todo-section">
      <div class="todo-cat-header">
        <div class="todo-cat-label" style="color:var(--text3)">Terminées (${done.length})</div>
      </div>
      <div class="todo-list">`;
    sortedDone.forEach((item, idx) => {
      html += renderTodoItem(item, idx, true); // true = showDelete
    });
    html += `</div></div>`;
  }

  return html;
}

function renderTodoItem(item, idx, showDelete = false) {
  const isOverdue = item.due && !item.done && new Date(item.due) < new Date();
  const dueStr = item.due ? new Date(item.due + 'T00:00:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }) : '';
  const prioIcon = { urgent: '🔴', normal: '🟡', later: '⚪' }[item.prio] || '';
  const assigneeLabel = item.assignee ? item.assignee.toUpperCase() : '';
  const needsValidation = item.validateBy && !item.done && !item.validated;
  const canValidate = item.validateBy === currentUser;
  // Tâche assignée à quelqu'un d'autre et pas encore faite = en attente
  const isWaiting = item.assignee && item.assignee !== currentUser && !item.done;

  let validationBadge = '';
  if (needsValidation) {
    validationBadge = canValidate
      ? `<button onclick="event.stopPropagation();validateTask('${item.id}')" style="background:rgba(255,107,53,0.2);border:1px solid var(--cat-lumiia);border-radius:8px;padding:3px 8px;font-size:0.72rem;color:var(--cat-lumiia);font-family:Syne,sans-serif;font-weight:700;cursor:pointer;white-space:nowrap">✓ Valider</button>`
      : `<div style="font-size:0.7rem;color:var(--cat-admin);font-family:Syne,sans-serif;font-weight:600;white-space:nowrap">⏳ ${item.validateBy.toUpperCase()}</div>`;
  }
  if (item.validated) {
    const validatorName = MEMBERS.find(m => m.id === item.validatedBy)?.name || item.validatedBy || '?';
    validationBadge = `<div style="font-size:0.7rem;color:var(--cat-perso);font-family:Syne,sans-serif;font-weight:600;display:flex;align-items:center;gap:3px">✓ validé par ${validatorName}</div>`;
  }

  let extraClass = '';
  if (needsValidation && canValidate) extraClass = ' needs-validation';
  if (isWaiting) extraClass += ' waiting-assigned';
  if (item.prio === 'urgent' && !item.done) extraClass += ' urgent-item';

  let waitingLabel = '';
  if (isWaiting) {
    waitingLabel = `<div style="font-size:0.7rem;color:var(--cat-admin);font-family:Syne,sans-serif;font-weight:600;white-space:nowrap">⏳ ${assigneeLabel}</div>`;
  }

  return `<div class="todo-item${item.done ? ' done' : ''}${extraClass}" style="animation-delay:${idx*0.03}s">
    <div class="todo-check" onclick="toggleTodo('${item.id}')" style="cursor:pointer;flex-shrink:0">${item.done ? '✓' : ''}</div>
    <div style="flex:1;min-width:0">
      <div class="todo-text" onclick="openDetail('${item.id}')" style="cursor:pointer">${item.title}</div>
    </div>
    <div class="todo-right">
      ${prioIcon ? `<div style="font-size:0.75rem">${prioIcon}</div>` : ''}
      ${isWaiting ? waitingLabel : (assigneeLabel ? `<div class="assignee-tag">${assigneeLabel}</div>` : '')}
      ${dueStr ? `<div class="due-tag${isOverdue ? ' overdue' : ''}">${dueStr}</div>` : ''}
      ${validationBadge}
      ${showDelete ? `<button onclick="event.stopPropagation();deleteItem('${item.id}')" style="background:none;border:none;color:var(--text3);font-size:1rem;cursor:pointer;padding:2px 4px;line-height:1;transition:color 0.15s;flex-shrink:0" onmouseover="this.style.color='var(--cat-urgent)'" onmouseout="this.style.color='var(--text3)'">✕</button>` : ''}
    </div>
  </div>`;
}

function renderFilterBar(allItems) {
  const usedCats = [...new Set(allItems.map(i => i.cat).filter(Boolean))];
  const hasToValidate = currentTab === 'todo' && allItems.some(i => i.validateBy === currentUser && !i.done && !i.validated);
  const hasWaiting = currentTab === 'todo' && allItems.some(i => i.assignee && i.assignee !== currentUser && !i.done);

  if (usedCats.length <= 1 && !hasToValidate && !hasWaiting) return '';

  let html = `<div class="filter-bar">
    <button class="filter-chip${filterCat === 'all' ? ' active' : ''}" onclick="setFilter('all')">Tout</button>`;

  usedCats.forEach(cat => {
    const c = CATS[cat] || { label: cat, color: '#888' };
    html += `<button class="filter-chip${filterCat === cat ? ' active' : ''}" onclick="setFilter('${cat}')">
      <span style="width:6px;height:6px;border-radius:50%;background:${c.color};display:inline-block"></span>
      ${c.label}
    </button>`;
  });

  if (hasToValidate) {
    html += `<button class="filter-chip${filterCat === '__validate__' ? ' active' : ''}" onclick="setFilter('__validate__')" style="color:var(--cat-lumiia);border-color:rgba(255,107,53,0.4)">
      ⏳ À valider
    </button>`;
  }
  if (hasWaiting) {
    html += `<button class="filter-chip${filterCat === '__waiting__' ? ' active' : ''}" onclick="setFilter('__waiting__')" style="color:var(--cat-admin);border-color:rgba(251,191,36,0.4)">
      ⌛ En attente
    </button>`;
  }

  html += `</div>`;
  return html;
}

function setFilter(cat) {
  filterCat = cat;
  render();
}

function applyFilterCat(arr) {
  if (filterCat === 'all') return arr;
  if (filterCat === '__validate__') return arr.filter(i => i.validateBy === currentUser && !i.done && !i.validated);
  if (filterCat === '__waiting__') return arr.filter(i => i.assignee && i.assignee !== currentUser && !i.done);
  return arr.filter(i => i.cat === filterCat);
}

function renderProjets() {
  if (currentProject) return renderProjetDetail(currentProject);

  const projectCats = Object.entries(CATS).filter(([id, c]) => c.isProject);

  if (projectCats.length === 0) {
    return `<div class="empty">
      <div class="empty-icon">📁</div>
      <div class="empty-text">Aucun projet configuré.<br>Dans ⚙️ Réglages, coche "Projet" sur les catégories souhaitées.</div>
    </div>`;
  }

  let html = `<div class="section-head"><div class="section-title">${projectCats.length} projet${projectCats.length > 1 ? 's' : ''}</div></div>`;
  html += `<div class="cards-grid">`;

  projectCats.forEach(([catId, cat], idx) => {
    const notes = items.filter(i => i.cat === catId && (i.type === 'note' || i.type === 'checklist'));
    const todos = items.filter(i => i.cat === catId && i.type === 'todo');
    const activeTodos = todos.filter(i => !i.done);
    const urgentCount = activeTodos.filter(i => i.prio === 'urgent').length;

    html += `<div class="card projet-card" data-cat="${catId}" onclick="openProject('${catId}')" style="animation-delay:${idx*0.05}s;min-height:140px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="card-dot" style="background:${cat.color}"></div>
        ${urgentCount > 0 ? `<div style="font-size:0.7rem;color:var(--cat-urgent);font-family:Syne,sans-serif;font-weight:700">🔴 ${urgentCount}</div>` : ''}
      </div>
      <div class="card-title" style="font-size:1.05rem">${cat.label}</div>
      <div style="display:flex;gap:10px;margin-top:auto">
        <div style="font-size:0.78rem;color:var(--text2)">📝 ${notes.length} note${notes.length !== 1 ? 's' : ''}</div>
        <div style="font-size:0.78rem;color:${activeTodos.length > 0 ? cat.color : 'var(--text3)'}">✅ ${activeTodos.length} tâche${activeTodos.length !== 1 ? 's' : ''}</div>
      </div>
    </div>`;
  });

  html += `</div>`;
  return html;
}

function renderProjetDetail(catId) {
  const cat = CATS[catId];
  if (!cat) return '';

  const notes = items.filter(i => i.cat === catId && (i.type === 'note' || i.type === 'checklist'));
  const todos = items.filter(i => i.cat === catId && i.type === 'todo');
  const activeTodos = todos.filter(i => !i.done);
  const doneTodos = todos.filter(i => i.done);

  let html = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <button onclick="closeProject()" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text2);font-size:0.8rem;font-family:Syne,sans-serif;font-weight:600;cursor:pointer">← Projets</button>
      <div style="width:12px;height:12px;border-radius:50%;background:${cat.color}"></div>
      <div style="font-family:Syne,sans-serif;font-weight:800;font-size:1.1rem;color:${cat.color}">${cat.label}</div>
    </div>`;

  // ── Notes du projet
  html += `<div class="section-head">
    <div class="section-title">📝 Notes · ${notes.length}</div>
    <button onclick="openCreateModalForProject('${catId}','note')" style="font-size:0.72rem;color:var(--cat-lumiia);background:none;border:none;cursor:pointer;font-family:Syne,sans-serif;font-weight:700">+ Note</button>
  </div>`;

  if (notes.length === 0) {
    html += `<div style="color:var(--text3);font-size:0.82rem;margin-bottom:20px;padding:12px;background:var(--bg2);border-radius:10px;border:1px dashed var(--border)">Aucune note dans ce projet</div>`;
  } else {
    html += `<div class="cards-grid" style="margin-bottom:24px">`;
    notes.forEach((item, idx) => { html += renderCard(item, idx); });
    html += `</div>`;
  }

  // ── Tâches actives
  html += `<div class="section-head">
    <div class="section-title">✅ Tâches · ${activeTodos.length}</div>
    <button onclick="openCreateModalForProject('${catId}','todo')" style="font-size:0.72rem;color:var(--cat-lumiia);background:none;border:none;cursor:pointer;font-family:Syne,sans-serif;font-weight:700">+ Tâche</button>
  </div>`;

  if (activeTodos.length === 0) {
    html += `<div style="color:var(--text3);font-size:0.82rem;margin-bottom:20px;padding:12px;background:var(--bg2);border-radius:10px;border:1px dashed var(--border)">Aucune tâche active</div>`;
  } else {
    // Trier par priorité dans la vue projet
    const sorted = [...activeTodos].sort((a,b) => ({'urgent':0,'normal':1,'later':2}[a.prio]??1) - ({'urgent':0,'normal':1,'later':2}[b.prio]??1));
    html += `<div class="todo-list" style="margin-bottom:24px">`;
    sorted.forEach((item, idx) => { html += renderTodoItem(item, idx); });
    html += `</div>`;
  }

  // ── Tâches terminées (collapsible)
  if (doneTodos.length > 0) {
    html += `<div class="section-head"><div class="section-title" style="opacity:0.5">Terminées · ${doneTodos.length}</div></div>`;
    html += `<div class="todo-list" style="opacity:0.5;margin-bottom:24px">`;
    doneTodos.slice(0, 5).forEach((item, idx) => { html += renderTodoItem(item, idx); });
    html += `</div>`;
  }

  return html;
}

  render();

const COLORS_PALETTE = ['#ff6b35','#00e5ff','#c084fc','#4ade80','#fbbf24','#f43f5e','#38bdf8','#fb923c','#a3e635','#e879f9'];
let editingCats = null;

function openSettings() {
  editingCats = Object.entries(CATS).map(([id, c]) => ({ id, label: c.label, color: c.color, isProject: !!c.isProject }));
  renderCatEditor();
  renderMembersList();
  openModal('modal-settings');
}

function renderCatEditor() {
  if (!editingCats) return;
  const projEl = document.getElementById('cat-list-editor-projects');
  const catEl = document.getElementById('cat-list-editor-cats');

  const renderRow = (cat, i) => `
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:20px;height:20px;border-radius:50%;background:${cat.color};flex-shrink:0;cursor:pointer" onclick="cycleCatColor(${i})" title="Changer la couleur"></div>
      <input type="text" value="${cat.label}" oninput="editingCats[${i}].label=this.value"
        style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:DM Sans,sans-serif;font-size:0.85rem;outline:none">
      <button onclick="removeCat(${i})" style="background:none;border:none;color:var(--text3);font-size:1rem;cursor:pointer;padding:4px;" onmouseover="this.style.color='var(--cat-urgent)'" onmouseout="this.style.color='var(--text3)'">✕</button>
    </div>`;

  if (projEl) {
    const projects = editingCats.map((c, i) => ({...c, _idx: i})).filter(c => c.isProject);
    projEl.innerHTML = projects.length ? projects.map(c => renderRow(c, c._idx)).join('') : `<div style="font-size:0.8rem;color:var(--text3);padding:6px 0">Aucun projet</div>`;
  }
  if (catEl) {
    const cats = editingCats.map((c, i) => ({...c, _idx: i})).filter(c => !c.isProject);
    catEl.innerHTML = cats.length ? cats.map(c => renderRow(c, c._idx)).join('') : `<div style="font-size:0.8rem;color:var(--text3);padding:6px 0">Aucune catégorie</div>`;
  }
}

function cycleCatColor(idx) {
  const current = COLORS_PALETTE.indexOf(editingCats[idx].color);
  editingCats[idx].color = COLORS_PALETTE[(current + 1) % COLORS_PALETTE.length];
  renderCatEditor();
}

function removeCat(idx) {
  editingCats.splice(idx, 1);
  renderCatEditor();
}

function addCat(isProject = false) {
  editingCats.push({ id: 'cat_' + Date.now(), label: isProject ? 'Nouveau projet' : 'Nouvelle catégorie', color: COLORS_PALETTE[editingCats.length % COLORS_PALETTE.length], isProject });
  renderCatEditor();
}

function saveCats() {
  if (!editingCats) return;
  Object.keys(CATS).forEach(k => delete CATS[k]);
  editingCats.forEach(c => { CATS[c.id] = { label: c.label, color: c.color, isProject: !!c.isProject }; });
  Object.entries(CATS).forEach(([id, c]) => {
    document.documentElement.style.setProperty(`--cat-${id}`, c.color);
  });
  rebuildCatPicker();
  closeModal('modal-settings');
  render();
}

function addMember() {
  const input = document.getElementById('new-member-name');
  const name = input?.value?.trim();
  if (!name) return;
  const id = name.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 8) + '_' + Date.now().toString(36).slice(-3);
  MEMBERS.push({ id, name, url: id });
  localStorage.setItem('lumiia-members', JSON.stringify(MEMBERS));
  if (input) input.value = '';
  renderMembersList();
}

function removeMember(idx) {
  MEMBERS.splice(idx, 1);
  localStorage.setItem('lumiia-members', JSON.stringify(MEMBERS));
  renderMembersList();
}

function copyMemberLink(memberId) {
  const url = `https://i-immersion.github.io/lumiia-workspace/?user=${memberId}`;
  const member = MEMBERS.find(m => m.id === memberId);
  const text = member ? `${member.name}, voici ton accès LUMIIA Workspace : ${url}` : url;

  const doFeedback = () => {
    const btn = document.getElementById(`copy-btn-${memberId}`);
    if (btn) {
      btn.textContent = '✓ Copié !';
      btn.style.color = 'var(--cat-perso)';
      btn.style.borderColor = 'rgba(74,222,128,0.4)';
      btn.style.background = 'rgba(74,222,128,0.08)';
      setTimeout(() => {
        btn.textContent = '🔗 Copier';
        btn.style.color = '';
        btn.style.borderColor = '';
        btn.style.background = '';
      }, 2500);
    }
  };

  if (navigator.share) {
    navigator.share({ title: 'LUMIIA Workspace', text, url }).then(doFeedback).catch(() => fallbackCopy(url, doFeedback));
  } else {
    fallbackCopy(url, doFeedback);
  }
}

function fallbackCopy(url, callback) {
  navigator.clipboard.writeText(url)
    .then(() => { if (callback) callback(); })
    .catch(() => { window.prompt('Copie ce lien :', url); if (callback) callback(); });
}

function cycleSortOrder() {} // deprecated

function toggleSortDate() {
  sortOrder = sortOrder === 'recent' ? 'oldest' : 'recent';
  const btn = document.getElementById('sort-date-btn');
  if (btn) { btn.style.color = 'var(--cat-lumiia)'; btn.title = sortOrder === 'recent' ? '↓ Plus récent' : '↑ Plus ancien'; setTimeout(() => btn.style.color = '', 600); }
  render();
}

function toggleSortPrio() {
  // 3 états : off → urgent d'abord → plus tard d'abord → off
  if (sortOrder !== 'priority' && sortOrder !== 'priority-rev') {
    sortOrder = 'priority';
  } else if (sortOrder === 'priority') {
    sortOrder = 'priority-rev';
  } else {
    sortOrder = 'recent';
  }
  const btn = document.getElementById('sort-prio-btn');
  if (btn) {
    btn.style.color = sortOrder.startsWith('priority') ? 'var(--cat-lumiia)' : '';
    btn.title = sortOrder === 'priority' ? '⚡ Urgent d\'abord' : sortOrder === 'priority-rev' ? '⚡ Plus tard d\'abord' : 'Trier par priorité';
  }
  render();
}

function applySortOrder(arr) {
  const priMap = { urgent: 0, normal: 1, later: 2 };
  if (sortOrder === 'recent')        return [...arr].sort((a, b) => (b.created||0) - (a.created||0));
  if (sortOrder === 'oldest')        return [...arr].sort((a, b) => (a.created||0) - (b.created||0));
  if (sortOrder === 'priority')      return [...arr].sort((a, b) => (priMap[a.prio]??2) - (priMap[b.prio]??2));
  if (sortOrder === 'priority-rev')  return [...arr].sort((a, b) => (priMap[b.prio]??2) - (priMap[a.prio]??2));
  return arr;
}

// ─────────────────────────────────────────────
// MODAL CREATE
// ─────────────────────────────────────────────
function openCreateModal() {
  editingId = null;
  currentType = 'note';
  currentCat = Object.keys(CATS)[0] || 'lumiia';
  currentNotePrio = 'later';
  clItems = [];
  clItemsTodo = [];
  document.getElementById('input-title').value = '';
  document.getElementById('input-content').value = '';
  document.getElementById('input-link').value = '';
  document.getElementById('input-todo-link').value = '';
  document.getElementById('input-todo-content').value = '';
  document.getElementById('input-prio').value = 'normal';
  document.getElementById('input-assignee').value = currentUser;
  const memberName = MEMBERS.find(m => m.id === currentUser)?.name || currentUser;
  const assigneeDisplay = document.getElementById('assignee-display');
  if (assigneeDisplay) assigneeDisplay.textContent = memberName;
  document.getElementById('input-due').value = '';
  document.getElementById('input-validate-by').value = '';
  document.getElementById('field-checklist').style.display = 'none';
  document.getElementById('field-checklist-todo').style.display = 'none';
  const btn = document.getElementById('toggle-cl-btn');
  if (btn) { btn.textContent = '☑️ Ajouter une checklist'; btn.style.color = 'var(--text2)'; }
  const btnTodo = document.getElementById('toggle-cl-todo-btn');
  if (btnTodo) { btnTodo.textContent = '☑️ Ajouter une checklist'; btnTodo.style.color = 'var(--text2)'; }
  rebuildCatPicker();
  updateMemberSelects();
  setType(currentTab === 'todo' ? 'todo' : 'note');
  selectCat(currentCat);
  renderClEditor();
  renderClEditorTodo();
  openModal('modal-create');
}

function setType(t) {
  currentType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === t));
  document.getElementById('field-content').style.display = t === 'note' ? '' : 'none';
  document.getElementById('field-todo').style.display = t === 'todo' ? '' : 'none';
  document.getElementById('field-note-prio').style.display = t === 'note' ? '' : 'none';
  if (t === 'todo') { document.getElementById('field-checklist').style.display = 'none'; }
  // Adapter les labels du toggle selon le type actif
  const btns = document.querySelectorAll('.type-btn');
  btns.forEach(b => {
    if (t === 'note') {
      if (b.dataset.type === 'note') b.textContent = '📝 Note';
      if (b.dataset.type === 'todo') b.textContent = '➡️ Envoyer vers To-do';
    } else {
      if (b.dataset.type === 'todo') b.textContent = '✅ To-do';
      if (b.dataset.type === 'note') b.textContent = '📋 Envoyer vers Note';
    }
  });
  // Titre de la modale
  const title = document.getElementById('modal-title');
  if (title) title.textContent = t === 'note' ? (editingId ? 'Modifier' : 'Nouvelle note') : (editingId ? 'Modifier' : 'Nouvelle tâche');
}

function toggleChecklist() {
  const el = document.getElementById('field-checklist');
  const btn = document.getElementById('toggle-cl-btn');
  const visible = el.style.display !== 'none';
  el.style.display = visible ? 'none' : '';
  btn.textContent = visible ? '☑️ Ajouter une checklist' : '✕ Retirer la checklist';
  btn.style.color = visible ? 'var(--text2)' : 'var(--cat-urgent)';
  if (!visible && clItems.length === 0) addClItem();
}

function toggleChecklistTodo() {
  const el = document.getElementById('field-checklist-todo');
  const btn = document.getElementById('toggle-cl-todo-btn');
  if (!el || !btn) return;
  const visible = el.style.display !== 'none';
  el.style.display = visible ? 'none' : '';
  btn.textContent = visible ? '☑️ Ajouter une checklist' : '✕ Retirer la checklist';
  btn.style.color = visible ? 'var(--text2)' : 'var(--cat-urgent)';
  if (!visible && clItemsTodo.length === 0) addClItemTodo();
}

function addClItemTodo(text = '') {
  clItemsTodo.push({ id: genId(), text, done: false });
  renderClEditorTodo();
  const inputs = document.querySelectorAll('#cl-editor-todo input');
  if (inputs.length) inputs[inputs.length - 1].focus();
}

function removeClItemTodo(id) {
  clItemsTodo = clItemsTodo.filter(i => i.id !== id);
  renderClEditorTodo();
}

function updateClItemTodo(id, val) {
  const i = clItemsTodo.find(x => x.id === id);
  if (i) i.text = val;
}

function renderClEditorTodo() {
  const el = document.getElementById('cl-editor-todo');
  if (!el) return;
  el.innerHTML = clItemsTodo.map(item => `
    <div class="cl-row">
      <input type="text" placeholder="Élément..." value="${item.text.replace(/"/g, '&quot;')}"
        oninput="updateClItemTodo('${item.id}', this.value)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addClItemTodo()}"
      >
      <button class="cl-del" onclick="removeClItemTodo('${item.id}')">✕</button>
    </div>
  `).join('');
}

function selectCat(cat) {
  currentCat = cat;
  // Mettre à jour tous les boutons cat-btn dans les deux pickers
  document.querySelectorAll('.cat-btn').forEach(b => {
    const c = CATS[b.dataset.cat];
    if (!c) return;
    const isSelected = b.dataset.cat === cat;
    b.classList.toggle('selected', isSelected);
    b.style.background = isSelected ? c.color : 'transparent';
    b.style.color = isSelected ? '#000' : 'var(--text2)';
    b.style.borderColor = isSelected ? 'transparent' : 'var(--border)';
  });
}

function addClItem(text = '') {
  clItems.push({ id: genId(), text, done: false });
  renderClEditor();
  const inputs = document.querySelectorAll('#cl-editor input');
  if (inputs.length) inputs[inputs.length - 1].focus();
}

function removeClItem(id) {
  clItems = clItems.filter(i => i.id !== id);
  renderClEditor();
}

function renderClEditor() {
  const el = document.getElementById('cl-editor');
  if (!el) return;
  el.innerHTML = clItems.map(item => `
    <div class="cl-row">
      <input type="text" placeholder="Élément..." value="${item.text.replace(/"/g, '&quot;')}"
        oninput="updateClItem('${item.id}', this.value)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addClItem()}"
      >
      <button class="cl-del" onclick="removeClItem('${item.id}')">✕</button>
    </div>
  `).join('');
}

function updateClItem(id, val) {
  const i = clItems.find(x => x.id === id);
  if (i) i.text = val;
}

function saveItem() {
  const title = document.getElementById('input-title').value.trim();
  if (!title) { document.getElementById('input-title').focus(); return; }

  const item = {
    id: editingId || genId(),
    type: currentType,
    cat: currentCat,
    title,
    owner: currentUser,
    created: editingId ? (items.find(i => i.id === editingId)?.created || Date.now()) : Date.now(),
    updated: Date.now(),
  };

  if (currentType === 'note') {
    item.content = document.getElementById('input-content').value.trim();
    item.link = document.getElementById('input-link').value.trim();
    item.prio = currentNotePrio || 'normal';
    const clVisible = document.getElementById('field-checklist').style.display !== 'none';
    item.checklist = clVisible ? clItems.filter(i => i.text.trim()) : [];
  }
  if (currentType === 'todo') {
    item.prio = document.getElementById('input-prio').value;
    item.assignee = document.getElementById('input-assignee').value;
    item.due = document.getElementById('input-due').value || null;
    item.content = document.getElementById('input-todo-content').value.trim();
    item.link = document.getElementById('input-todo-link').value.trim();
    item.done = editingId ? (items.find(i => i.id === editingId)?.done || false) : false;
    item.shared = item.assignee !== currentUser;
    item.validateBy = document.getElementById('input-validate-by').value || null;
    item.validated = editingId ? (items.find(i => i.id === editingId)?.validated || false) : false;
    // Checklist to-do
    const clTodoVisible = document.getElementById('field-checklist-todo').style.display !== 'none';
    item.checklist = clTodoVisible ? clItemsTodo.filter(i => i.text.trim()) : (editingId ? (items.find(i => i.id === editingId)?.checklist || []) : []);
  }

  if (editingId) {
    const idx = items.findIndex(i => i.id === editingId);
    if (idx !== -1) items[idx] = item;
  } else {
    items.unshift(item);
  }

  save();
  closeModal('modal-create');
  render();
}

// ─────────────────────────────────────────────
// DETAIL
// ─────────────────────────────────────────────
function openDetail(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;

  const cat = CATS[item.cat] || CATS.lumiia;
  let html = '';

  if (item.type === 'todo') {
    // ── MODALE TO-DO REDESIGNÉE ──
    const prioColors = { urgent: 'var(--cat-urgent)', normal: 'var(--cat-admin)', later: 'var(--text3)' };
    const prioLabels = { urgent: '🔴 Urgent', normal: '🟡 Normal', later: '⚪ Plus tard' };
    const prioLabel = prioLabels[item.prio] || '⚪ Plus tard';
    const prioColor = prioColors[item.prio] || 'var(--text3)';
    const assigneeName = MEMBERS.find(m => m.id === item.assignee)?.name || item.assignee || '';
    const ownerName = MEMBERS.find(m => m.id === item.owner)?.name || '';
    const validatorName = item.validated ? (MEMBERS.find(m => m.id === item.validatedBy)?.name || item.validatedBy || '?') : '';
    const dueStr = item.due ? new Date(item.due + 'T00:00:00').toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }) : '';
    const isOverdue = item.due && !item.done && new Date(item.due) < new Date();
    const catInfo = CATS[item.cat] || Object.values(CATS)[0] || { label: '', color: '#888' };
    const isAssignedToMe = item.assignee === currentUser;
    const needsMyValidation = item.validateBy === currentUser && !item.done && !item.validated;

    // Titre + statut
    html += `<div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="width:10px;height:10px;border-radius:50%;background:${catInfo.color};flex-shrink:0"></div>
        <div style="font-size:0.72rem;color:var(--text3);font-family:Syne,sans-serif;font-weight:700;letter-spacing:0.1em;text-transform:uppercase">${catInfo.label}</div>
        ${item.done ? `<div style="margin-left:auto;font-size:0.7rem;color:var(--cat-perso);font-family:Syne,sans-serif;font-weight:700;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.25);border-radius:20px;padding:3px 10px">✓ Terminée</div>` : ''}
      </div>
      <div style="font-family:Syne,sans-serif;font-weight:800;font-size:1.2rem;line-height:1.3;color:var(--text);${item.done ? 'text-decoration:line-through;opacity:0.6' : ''}">${item.title}</div>
    </div>`;

    // Bloc méta — grille 2 colonnes
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:${item.content || item.checklist?.length ? '20px' : '8px'}">`;

    // Priorité
    html += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 14px">
      <div style="font-size:0.65rem;color:var(--text3);font-family:Syne,sans-serif;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px">Priorité</div>
      <div style="font-size:0.88rem;font-weight:600;color:${prioColor}">${prioLabel}</div>
    </div>`;

    // Assigné à
    html += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 14px">
      <div style="font-size:0.65rem;color:var(--text3);font-family:Syne,sans-serif;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px">Assigné à</div>
      <div style="font-size:0.88rem;font-weight:600;color:var(--text)">${assigneeName || '—'}</div>
    </div>`;

    // Échéance
    if (dueStr) {
      html += `<div style="background:${isOverdue ? 'rgba(244,63,94,0.1)' : 'var(--bg3)'};border:1px solid ${isOverdue ? 'rgba(244,63,94,0.3)' : 'var(--border)'};border-radius:12px;padding:10px 14px;grid-column:1/-1">
        <div style="font-size:0.65rem;color:${isOverdue ? 'var(--cat-urgent)' : 'var(--text3)'};font-family:Syne,sans-serif;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px">${isOverdue ? '⚠️ En retard' : '📅 Échéance'}</div>
        <div style="font-size:0.88rem;font-weight:600;color:${isOverdue ? 'var(--cat-urgent)' : 'var(--text)'}">${dueStr}</div>
      </div>`;
    }

    html += `</div>`;

    // Badge validé
    if (item.validated) {
      html += `<div style="display:flex;align-items:center;gap:10px;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.25);border-radius:12px;padding:12px 16px;margin-bottom:16px">
        <div style="width:28px;height:28px;border-radius:50%;background:rgba(74,222,128,0.2);display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0">✓</div>
        <div>
          <div style="font-size:0.8rem;font-weight:700;color:var(--cat-perso);font-family:Syne,sans-serif">Validée par ${validatorName}</div>
          ${item.validatedAt ? `<div style="font-size:0.72rem;color:var(--text3)">${new Date(item.validatedAt).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' })}</div>` : ''}
        </div>
      </div>`;
    }

    // Bouton valider si nécessaire
    if (needsMyValidation) {
      html += `<button onclick="validateTask('${item.id}')" style="width:100%;padding:12px;background:rgba(255,107,53,0.15);border:1px solid rgba(255,107,53,0.4);border-radius:12px;color:var(--cat-lumiia);font-family:Syne,sans-serif;font-weight:700;font-size:0.88rem;cursor:pointer;margin-bottom:16px;transition:all 0.15s">
        ✓ Valider cette tâche
      </button>`;
    }

    // Séparateur si contenu
    if (item.content || item.checklist?.length || item.link) {
      html += `<div style="height:1px;background:var(--border);margin-bottom:16px"></div>`;
    }

    // Contenu texte
    if (item.content) {
      html += `<div style="font-size:0.92rem;line-height:1.75;color:var(--text);margin-bottom:16px;white-space:pre-wrap">${item.content}</div>`;
    }

    // Checklist
    if (item.checklist?.length) {
      const done = item.checklist.filter(i => i.done).length;
      const pct = Math.round((done / item.checklist.length) * 100);
      html += `<div style="margin-bottom:6px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-size:0.7rem;color:var(--text3);font-family:Syne,sans-serif;font-weight:700;letter-spacing:0.1em;text-transform:uppercase">Checklist</div>
          <div style="font-size:0.72rem;color:var(--text3)">${done}/${item.checklist.length}</div>
        </div>
        <div style="height:3px;background:var(--bg3);border-radius:2px;margin-bottom:10px">
          <div style="height:3px;background:${catInfo.color};border-radius:2px;width:${pct}%;transition:width 0.3s"></div>
        </div>
      </div>`;
      html += `<div class="checklist-full" style="margin-bottom:16px">`;
      item.checklist.forEach(ci => {
        html += `<div class="cl-item-full${ci.done ? ' done' : ''}" onclick="toggleClItem('${item.id}','${ci.id}')">
          <div class="cl-check-full" style="border-color:${catInfo.color}">${ci.done ? '✓' : ''}</div>
          <div class="cl-item-text" style="font-size:0.9rem">${ci.text}</div>
        </div>`;
      });
      html += `</div>`;
    }

    // Lien
    if (item.link) {
      html += `<a href="${item.link}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--cat-signal);font-size:0.82rem;text-decoration:none;word-break:break-all">
        🔗 <span>${item.link}</span>
      </a>`;
    }

  } else {
    // ── MODALE NOTE ──
    html += `<div class="note-detail-header">
      <div class="card-dot dot-${item.cat}" style="margin-top:4px"></div>
      <div class="note-detail-title">${item.title}</div>
    </div>`;
    html += `<div style="font-size:0.72rem;color:var(--text3);margin-bottom:14px;font-family:Syne,sans-serif;letter-spacing:0.08em;text-transform:uppercase">${cat.label}</div>`;

    if (item.content) {
      const lines = item.content.split('\n').filter(l => l.trim());
      const isVocab = lines.some(l => /^[A-ZÀÉÈÊËÎÏÔÙÛÜ\s']+\s*—/.test(l));
      let contentHtml;
      if (isVocab) {
        contentHtml = `<ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px">` +
          lines.map(line => {
            const match = line.match(/^([A-ZÀÉÈÊËÎÏÔÙÛÜ][A-ZÀÉÈÊËÎÏÔÙÛÜ\s']+?)\s*—\s*(.+)$/);
            if (match) {
              return `<li style="display:flex;gap:8px;align-items:baseline">
                <span style="color:${cat.color};font-family:Syne,sans-serif;font-weight:700;font-size:0.8rem;letter-spacing:0.06em;white-space:nowrap;flex-shrink:0">${match[1]}</span>
                <span style="color:var(--text2);font-size:0.88rem">— ${match[2]}</span>
              </li>`;
            }
            return `<li style="color:var(--text2);font-size:0.88rem;padding-left:4px">${line}</li>`;
          }).join('') + `</ul>`;
      } else {
        contentHtml = `<p style="white-space:pre-wrap;color:var(--text2);font-size:0.88rem;line-height:1.7">${item.content}</p>`;
      }
      html += `<div class="note-detail-content" style="padding:4px 0">${contentHtml}</div>`;
    }

    // Checklist dans note fusionnée
    if (item.checklist?.length) {
      const done = item.checklist.filter(i => i.done).length;
      html += `<div style="font-size:0.72rem;color:var(--text3);margin-bottom:10px;margin-top:12px;font-family:Syne,sans-serif;letter-spacing:0.06em">${done}/${item.checklist.length} COMPLÉTÉS</div>`;
      html += `<div class="checklist-full">`;
      item.checklist.forEach(ci => {
        html += `<div class="cl-item-full${ci.done ? ' done' : ''}" onclick="toggleClItem('${item.id}','${ci.id}')">
          <div class="cl-check-full">${ci.done ? '✓' : ''}</div>
          <div class="cl-item-text">${ci.text}</div>
        </div>`;
      });
      html += `</div>`;
    }

    if (item.qrCode) {
      html += `<div style="margin:16px 0;display:flex;flex-direction:column;align-items:center;gap:10px">
        <img src="data:image/png;base64,${item.qrCode}" style="width:160px;height:160px;border-radius:12px;background:#fff;padding:8px">
        <div style="font-size:0.75rem;color:var(--text3);font-family:Syne,sans-serif;letter-spacing:0.06em">Scanner pour ouvrir l'app</div>
      </div>`;
    }

    if (item.link) {
      html += `<a href="${item.link}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--cat-signal);font-size:0.82rem;text-decoration:none;margin-top:12px;word-break:break-all">
        🔗 <span>${item.link}</span>
      </a>`;
    }
  }

  html += `<div class="note-footer">
    <button class="btn-delete" onclick="deleteItem('${item.id}')">🗑 Supprimer</button>
    <button class="btn-secondary" onclick="editItem('${item.id}')">Modifier</button>
  </div>`;

  document.getElementById('detail-content').innerHTML = html;
  openModal('modal-detail');
}

function toggleClItem(itemId, ciId) {
  const item = items.find(i => i.id === itemId);
  if (!item?.checklist) return;
  const ci = item.checklist.find(c => c.id === ciId);
  if (ci) { ci.done = !ci.done; save(); openDetail(itemId); render(); }
}

function toggleTodo(id) {
  const item = items.find(i => i.id === id);
  if (item) { item.done = !item.done; save(); render(); }
}

async function validateTask(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.validated = true;
  item.validatedBy = currentUser;
  item.validatedAt = Date.now();
  item.done = true;
  await save();
  render();
}

async function deleteItem(id, skipConfirm = false) {
  if (!skipConfirm && !confirm('Supprimer ?')) return;
  closeModal('modal-detail');
  await removeItem(id);
}

function editItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  closeModal('modal-detail');
  editingId = id;
  currentType = (item.type === 'checklist') ? 'note' : item.type;
  currentCat = item.cat;
  clItems = (item.type !== 'todo' && item.checklist) ? [...item.checklist] : [];
  clItemsTodo = (item.type === 'todo' && item.checklist) ? [...item.checklist] : [];
  document.getElementById('input-title').value = item.title;
  document.getElementById('input-content').value = item.content || '';
  document.getElementById('input-link').value = item.link || '';
  document.getElementById('input-todo-content').value = (item.type === 'todo' ? item.content : '') || '';
  document.getElementById('input-todo-link').value = (item.type === 'todo' ? item.link : '') || '';
  if (item.prio) document.getElementById('input-prio').value = item.prio;
  if (item.assignee) {
    document.getElementById('input-assignee').value = item.assignee;
    const assigneeDisplay = document.getElementById('assignee-display');
    if (assigneeDisplay) {
      assigneeDisplay.textContent = MEMBERS.find(m => m.id === item.assignee)?.name || item.assignee;
    }
  }
  if (item.due) document.getElementById('input-due').value = item.due;
  document.getElementById('input-validate-by').value = item.validateBy || '';
  document.getElementById('modal-title').textContent = 'Modifier';
  // Afficher checklist note
  const hasCl = currentType === 'note' && clItems.length > 0;
  document.getElementById('field-checklist').style.display = hasCl ? '' : 'none';
  const btn = document.getElementById('toggle-cl-btn');
  if (btn) { btn.textContent = hasCl ? '✕ Retirer la checklist' : '☑️ Ajouter une checklist'; btn.style.color = hasCl ? 'var(--cat-urgent)' : 'var(--text2)'; }
  // Afficher checklist to-do
  const hasClTodo = currentType === 'todo' && clItemsTodo.length > 0;
  document.getElementById('field-checklist-todo').style.display = hasClTodo ? '' : 'none';
  const btnTodo = document.getElementById('toggle-cl-todo-btn');
  if (btnTodo) { btnTodo.textContent = hasClTodo ? '✕ Retirer la checklist' : '☑️ Ajouter une checklist'; btnTodo.style.color = hasClTodo ? 'var(--cat-urgent)' : 'var(--text2)'; }
  setType(currentType);
  selectCat(currentCat);
  renderClEditor();
  renderClEditorTodo();
  openModal('modal-create');
}

function openModal(id) {

}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});
